<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iMessage PRM</title>
  <!-- Inline SVG favicon: an iMessage-blue chat bubble. No binary asset, works
       offline, no extra request, nothing to leak in a public repo. -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230b84fe'/><path d='M30 28h40a10 10 0 0 1 10 10v18a10 10 0 0 1-10 10H50L34 82V66h-4a10 10 0 0 1-10-10V38a10 10 0 0 1 10-10z' fill='white'/></svg>" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header id="head">
      <div id="head-left">
        <h1>iMessage PRM</h1>
      </div>
      <div id="counts-row">
        <div id="counts" class="counts"></div>
        <span id="synced" class="synced" hidden></span>
        <button id="refresh-btn" class="refresh-btn" hidden title="Snapshot the live Messages DB and rebuild">↻ Refresh</button>
      </div>
      <div id="search-wrap">
        <input id="search" type="search" autocomplete="off" spellcheck="false"
               placeholder="Type a name to filter — or press Enter to search messages (use &quot;quotes&quot; for exact)…" />
        <span id="search-spin" class="spin-dot" hidden></span>
      </div>
      <div id="controls">
        <div id="views" role="group" aria-label="Views">
          <button class="view-btn" data-view="recent">Recent</button>
          <button class="view-btn" data-view="lost">Lost touch</button>
        </div>
        <div id="facets"></div>
        <label class="opt-toggle" id="unnamed-toggle" title="Hide bare phone numbers with no name or suggestion">
          <input type="checkbox" id="hide-unnamed" /> Hide unnamed numbers
        </label>
        <label class="opt-toggle" id="groups-toggle" title="Groups aren't people — include them in the table">
          <input type="checkbox" id="show-groups" /> Show groups
        </label>
      </div>
      <div id="bulkbar" hidden></div>
      <div id="status" aria-live="polite"></div>
    </header>

    <div id="table-scroll">
      <div id="loading" role="status" aria-live="polite" hidden><span class="spin-dot spin-lg"></span><span id="loading-text">Searching…</span></div>
      <table id="grid">
        <thead>
          <tr>
            <th class="col-name"  data-sort="name">Name</th>
            <th class="col-cat"   data-sort="category">Category</th>
            <th class="col-last"  data-sort="last">Last contact</th>
            <th class="col-count" data-sort="count">Messages</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div id="empty" hidden></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
